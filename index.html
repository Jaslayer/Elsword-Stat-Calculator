<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>裝備配置計算機Ver2.0</title>
    <meta
      name="description"
      content="A basic GitHub Pages site starter."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="page-header">
      <h1 class="page-title">裝備配置計算機<span class="version">Ver2.0</span></h1>
    </header>
    <main class="container" aria-label="Main panel">
      <aside class="sidebar">
        <nav class="stat-list" aria-label="Statistics list">
          <button class="stat-item" data-description="含%攻比較">物/魔攻擊力</button>
          <button class="stat-item" data-description="">致命一擊傷害</button>
          <button class="stat-item" data-description="">Boss 傷害</button>
          <button class="stat-item" data-description="">兩極化</button>
          <button class="stat-item" data-description="">強烈/超越技傷</button>
          <button class="stat-item" data-description="">所有技傷</button>
          <button class="stat-item" data-description="">流血</button>
          <button class="stat-item" data-description="">100%以下</button>
          <button class="stat-item" data-description="">50%以上/以下</button>
          <button class="stat-item" data-description='含"超適應力"'>適應力</button>
          <button class="stat-item" data-description="">其他</button>
        </nav>
      </aside>
      <section class="content" aria-label="Content area">
        <div class="description-panel" id="descriptionPanel">
          <p>群母上的风桌選手</p>
        </div>
      </section>
    </main>
    <script>
      const statItems = document.querySelectorAll('.stat-item');
      
      // 初始化遊戲數值狀態陣列，每個位置對應一個數值是否被選中
      const selectedGameStats = new Array(statItems.length).fill(false);

      const descriptionPanel = document.getElementById('descriptionPanel');
      const descriptionText = descriptionPanel.querySelector('p');

      statItems.forEach(item => {
        item.addEventListener('mouseenter', (e) => {
          const description = e.target.getAttribute('data-description');
          descriptionText.textContent = description || '選項說明';
          
          const rect = e.target.getBoundingClientRect();
          const containerRect = document.querySelector('.container').getBoundingClientRect();
          const panelLeft = rect.right - containerRect.left + 5;
          const panelTop = rect.top - containerRect.top + rect.height / 2 - descriptionPanel.offsetHeight / 2;
          
          descriptionPanel.style.left = panelLeft + 'px';
          descriptionPanel.style.top = panelTop + 'px';
          descriptionPanel.classList.add('show');
        });

        item.addEventListener('mouseleave', () => {
          descriptionPanel.classList.remove('show');
        });

        item.addEventListener('click', (e) => {
          const itemIndex = Array.from(statItems).indexOf(e.target);
          
          // Toggle selected 狀態
          e.target.classList.toggle('selected');
          
          // 移除焦點，使按鈕立即回復到正常樣式
          e.target.blur();
          
          // 更新遊戲數值選取狀態陣列
          selectedGameStats[itemIndex] = !selectedGameStats[itemIndex];
          
          console.log('當前選中的遊戲數值:', selectedGameStats);
        });
      });
    </script>
  </body>
</html>
