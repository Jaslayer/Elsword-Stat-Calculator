<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>裝備配置計算機Ver2.0</title>
    <meta
      name="description"
      content="A basic GitHub Pages site starter."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="page-header">
      <h1 class="page-title">裝備配置計算機<span class="version">Ver2.0</span></h1>
    </header>
    <main class="container" aria-label="Main panel">
      <aside class="sidebar">
        <nav class="stat-list" aria-label="Statistics list">
          <button class="stat-item" data-description="">物/魔攻擊力</button>
          <button class="stat-item" data-description='含"超適應力"'>適應力</button>
          <button class="stat-item" data-description="">致命一擊傷害</button>
          <button class="stat-item" data-description="">兩極化</button>
          <button class="stat-item" data-description="">Boss 傷害</button>
          <button class="stat-item" data-description="">50%以上/以下</button>
          <button class="stat-item" data-description="">100%以下</button>
          <button class="stat-item" data-description="">流血</button>
          <button class="stat-item" data-description="">強烈/超越技傷</button>
          <button class="stat-item" data-description="">所有技傷</button>
          <button class="stat-item" data-description="">其他</button>
        </nav>
        <div class="calc-panel" id="calcPanel">
        </div>
      </aside>
      <section class="content" aria-label="Content area">
        <div class="description-panel" id="descriptionPanel">
          <p>群母上的风桌選手</p>
        </div>
      </section>
    </main>
    <script>
      // 浮点数精度处理函数 - 避免 5.3 显示成 5.3000000002 或 5.29999999
      const roundNumber = (num, decimals = 10) => {
        if (!Number.isFinite(num)) return num;
        // 用字符串匹配来保留有意义的小数位数
        const multiplier = Math.pow(10, decimals);
        const rounded = Math.round(num * multiplier) / multiplier;
        // 如果结果是整数，返回整数；否则返回精确的浮点数
        return parseFloat(rounded.toFixed(decimals).replace(/\.?0+$/, ''));
      };

      const statItems = document.querySelectorAll('.stat-item');
      const STORAGE_KEY = 'selectedGameStats';
      
      // 初始化遊戲數值狀態陣列，每個位置對應一個數值是否被選中
      // 優先從 localStorage 讀取，如果沒有則初始化為 false
      let selectedGameStats = localStorage.getItem(STORAGE_KEY)
        ? JSON.parse(localStorage.getItem(STORAGE_KEY))
        : new Array(statItems.length).fill(false);

      const descriptionPanel = document.getElementById('descriptionPanel');
      const descriptionText = descriptionPanel.querySelector('p');


      // 根據保存的狀態恢復按鈕的視覺狀態
      statItems.forEach((item, index) => {
        if (selectedGameStats[index]) {
          item.classList.add('selected');
        }
      });

      statItems.forEach(item => {
        item.addEventListener('mouseenter', (e) => {
          const description = e.target.getAttribute('data-description');
          
          // 如果 data-description 為空，則不開啟懸浮視窗
          if (!description) {
            return;
          }
          
          descriptionText.textContent = description;
          
          const rect = e.target.getBoundingClientRect();
          const containerRect = document.querySelector('.container').getBoundingClientRect();
          const panelLeft = rect.right - containerRect.left + 5;
          const panelTop = rect.top - containerRect.top + rect.height / 2 - descriptionPanel.offsetHeight / 2;
          
          descriptionPanel.style.left = panelLeft + 'px';
          descriptionPanel.style.top = panelTop + 'px';
          descriptionPanel.classList.add('show');
        });

        item.addEventListener('mouseleave', () => {
          descriptionPanel.classList.remove('show');
        });

        item.addEventListener('click', (e) => {
          const itemIndex = Array.from(statItems).indexOf(e.target);
          
          // Toggle selected 狀態
          e.target.classList.toggle('selected');
          
          // 移除焦點，使按鈕立即回復到正常樣式
          e.target.blur();
          
          // 更新遊戲數值選取狀態陣列
          selectedGameStats[itemIndex] = !selectedGameStats[itemIndex];
          
          // 保存到 localStorage
          localStorage.setItem(STORAGE_KEY, JSON.stringify(selectedGameStats));
          
          // 更新輸入面板
          updateInputPanel();
          
          console.log('當前選中的遊戲數值:', selectedGameStats);
        });
      });

      // 更新輸入面板的函數
      function updateInputPanel() {
        const calcPanel = document.getElementById('calcPanel');
        let wrapper = calcPanel.querySelector('.input-items-wrapper');
        
        // 如果不存在包裝容器，創建它
        if (!wrapper) {
          wrapper = document.createElement('div');
          wrapper.className = 'input-items-wrapper';
          calcPanel.insertBefore(wrapper, calcPanel.firstChild);
        }
        
        // 獲取應該存在的 stat-item 索引
        const shouldExistIndices = [];
        statItems.forEach((item, index) => {
          if (selectedGameStats[index]) {
            shouldExistIndices.push(index);
          }
        });
        
        // 獲取當前存在的 panel 索引
        const currentPanels = wrapper.querySelectorAll('.input-panel-item');
        const currentIndices = Array.from(currentPanels).map(panel => parseInt(panel.dataset.index));
        
        // 判斷是要添加還是刪除
        const toAdd = shouldExistIndices.filter(index => !currentIndices.includes(index));
        const toRemove = currentIndices.filter(index => !shouldExistIndices.includes(index));
        
        if (toRemove.length > 0) {
          // 刪除模式：先縮小 calc-panel，再刪除 panels
          // 添加 removing 類開始刪除動畫
          toRemove.forEach((index) => {
            const panel = wrapper.querySelector(`[data-index="${index}"]`);
            if (panel) {
              panel.classList.add('removing');
            }
          });
          
          // 計算新的高度（排除要刪除的 panels）並縮小 calc-panel
          updatePanelHeight(toRemove);
          
          // 等待收縮動畫完成後刪除 panels
          setTimeout(() => {
            toRemove.forEach((index) => {
              const panel = wrapper.querySelector(`[data-index="${index}"]`);
              if (panel) {
                panel.remove();
              }
            });
            // 重新排列剩餘的 panels
            reorderPanels(shouldExistIndices, wrapper);
          }, 350);
        } else if (toAdd.length > 0) {
          // 添加模式：先添加 panels，展開 calc-panel，再顯示動畫
          // 先添加新的 panels
          toAdd.forEach((index) => {
            const statItem = statItems[index];
            createInputPanel(statItem, index, wrapper, true); // 傳入 true 表示新增
          });
          
          // 重新排列
          reorderPanels(shouldExistIndices, wrapper);
          
          // 先計算新的高度並展開 calc-panel
          setTimeout(() => {
            updatePanelHeight();
          }, 50);
        } else {
          // 只有排序變化
          reorderPanels(shouldExistIndices, wrapper);
        }
      }
      
      // 重新排列 panels 的函數
      function reorderPanels(shouldExistIndices, wrapper) {
        const allPanels = Array.from(wrapper.querySelectorAll('.input-panel-item'));
        allPanels.forEach((panel) => {
          const panelIndex = parseInt(panel.dataset.index);
          const targetPosition = shouldExistIndices.indexOf(panelIndex);
          const currentPosition = Array.from(wrapper.children).indexOf(panel);
          
          // 如果位置不正確，添加動畫類並移動到正確位置
          if (currentPosition !== targetPosition) {
            // 添加重排序動畫類
            panel.classList.add('reordering');
            
            if (targetPosition === 0) {
              wrapper.insertBefore(panel, wrapper.firstChild);
            } else {
              const targetElement = Array.from(wrapper.children)[targetPosition];
              if (targetElement) {
                wrapper.insertBefore(panel, targetElement);
              } else {
                wrapper.appendChild(panel);
              }
            }
            
            // 動畫完成後移除類
            setTimeout(() => {
              panel.classList.remove('reordering');
            }, 350);
          }
        });
      }
      
      // 更新 calc-panel 的高度
      // excludeIndices: 要排除的 panel 索引陣列（用於刪除時計算新高度）
      function updatePanelHeight(excludeIndices = []) {
        const calcPanel = document.getElementById('calcPanel');
        const wrapper = calcPanel.querySelector('.input-items-wrapper');
        
        if (!wrapper) {
          return;
        }
        
        // 使用多次 requestAnimationFrame 確保布局穩定後再計算
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            // 先隱藏要排除的 panels
            excludeIndices.forEach(index => {
              const panel = wrapper.querySelector(`[data-index="${index}"]`);
              if (panel) {
                panel.style.display = 'none';
              }
            });
            
            // 等待隱藏生效後再計算高度
            requestAnimationFrame(() => {
              const visiblePanels = Array.from(wrapper.querySelectorAll('.input-panel-item')).filter(panel => {
                return panel.style.display !== 'none';
              });
              
              if (visiblePanels.length === 0) {
                // 沒有內容，設置為 0
                calcPanel.style.height = '0px';
              } else {
                // 直接使用 wrapper 的 scrollHeight（包括所有可見內容和 gap）
                const wrapperHeight = wrapper.scrollHeight;
                const styles = window.getComputedStyle(calcPanel);
                const paddingTop = parseFloat(styles.paddingTop) || 0;
                const paddingBottom = parseFloat(styles.paddingBottom) || 0;
                const totalHeight = wrapperHeight + paddingTop + paddingBottom;
                
                calcPanel.style.height = totalHeight + 'px';
              }
              
              // 還原隱藏
              excludeIndices.forEach(index => {
                const panel = wrapper.querySelector(`[data-index="${index}"]`);
                if (panel) {
                  panel.style.display = '';
                }
              });
            });
          });
        });
      }

      // 為每個被選中的 stat-item 創建一個 input-panel
      function createInputPanel(statItem, index, container, isNewItem = false) {
        const panelDiv = document.createElement('div');
        panelDiv.className = 'input-panel-item';
        if (isNewItem) {
          panelDiv.classList.add('entering');
        }
        panelDiv.dataset.index = index;
        
        // 判斷是否需要按鈕型輸入框的 stat-item
        const buttonInputIndices = [0, 1, 2, 4, 5, 10];
        const useButtonInput = buttonInputIndices.includes(index);
        
        if (useButtonInput) {
          // 按鈕型輸入框
          panelDiv.innerHTML = `
            <button class="delete-panel-btn-inline" data-index="${index}">×</button>
            <div class="panel-row">
              <div class="panel-label">${statItem.textContent}</div>
              <div class="configs-group">
                <div class="config-wrapper">
                  <button class="button-input left-input" data-index="${index}" data-type="left">--</button>
                  <div class="input-spinner">
                    <button class="spinner-btn up" data-type="left" data-index="${index}">∧</button>
                    <button class="spinner-btn down" data-type="left" data-index="${index}">∨</button>
                  </div>
                </div>
                <div class="config-wrapper">
                  <button class="button-input result-input" data-index="${index}" data-type="result">--</button>
                  <div class="input-spinner">
                    <button class="spinner-btn up" data-type="result" data-index="${index}">∧</button>
                    <button class="spinner-btn down" data-type="result" data-index="${index}">∨</button>
                  </div>
                </div>
              </div>
              <div class="config-wrapper">
                <span class="middle-indicator">▲</span>
                <input type="number" class="stat-input short-input middle-input" placeholder="變動量" data-index="${index}" />
                <div class="input-spinner">
                  <button class="spinner-btn up" data-type="middle" data-index="${index}">∧</button>
                  <button class="spinner-btn down" data-type="middle" data-index="${index}">∨</button>
                </div>
              </div>
            </div>
          `;
        } else {
          // 常規輸入框
          panelDiv.innerHTML = `
            <button class="delete-panel-btn-inline" data-index="${index}">×</button>
            <div class="panel-row">
              <div class="panel-label">${statItem.textContent}</div>
              <div class="configs-group">
                <div class="config-wrapper">
                  <input type="number" class="stat-input short-input left-input" placeholder="配置1" data-index="${index}" />
                  <div class="input-spinner">
                    <button class="spinner-btn up" data-type="left" data-index="${index}">∧</button>
                    <button class="spinner-btn down" data-type="left" data-index="${index}">∨</button>
                  </div>
                </div>
                <div class="config-wrapper">
                  <input type="number" class="stat-input short-input result-input" placeholder="配置2" data-index="${index}" />
                  <div class="input-spinner">
                    <button class="spinner-btn up" data-type="result" data-index="${index}">∧</button>
                    <button class="spinner-btn down" data-type="result" data-index="${index}">∨</button>
                  </div>
                </div>
              </div>
              <div class="config-wrapper">
                <span class="middle-indicator">▲</span>
                <input type="number" class="stat-input short-input middle-input" placeholder="變動量" data-index="${index}" />
                <div class="input-spinner">
                  <button class="spinner-btn up" data-type="middle" data-index="${index}">∧</button>
                  <button class="spinner-btn down" data-type="middle" data-index="${index}">∨</button>
                </div>
              </div>
            </div>
          `;
        }
        
        // 确保删除按钮元素存在
        const deleteBtn = panelDiv.querySelector('.delete-panel-btn-inline');
        
        // 绑定 panel 的 hover 事件，显示隐藏删除按钮
        panelDiv.addEventListener('mouseenter', () => {
          deleteBtn.classList.add('show');
        });
        
        panelDiv.addEventListener('mouseleave', () => {
          deleteBtn.classList.remove('show');
        });
        
        // 绑定删除按钮的点击事件
        deleteBtn.addEventListener('click', () => {
          statItems[index].classList.remove('selected');
          selectedGameStats[index] = false;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(selectedGameStats));
          updateInputPanel();
        });
        
        container.appendChild(panelDiv);
        
        // 動畫完成後移除 entering 類
        if (isNewItem) {
          setTimeout(() => {
            panelDiv.classList.remove('entering');
          }, 400);
        }
        
        // 綁定計算事件 - 三向绑定逻辑
        const leftInput = panelDiv.querySelector('.left-input');
        const middleInput = panelDiv.querySelector('.middle-input');
        const resultInput = panelDiv.querySelector('.result-input');
        const middleIndicator = panelDiv.querySelector('.middle-indicator');
        
        // 獲取輸入值的輔助函數
        const getInputValue = (element) => {
          let value;
          if (element.classList.contains('button-input')) {
            value = element.dataset.value ? parseFloat(element.dataset.value) : 0;
          } else {
            value = element.value ? parseFloat(element.value) : 0;
          }
          return roundNumber(value);
        };
        
        // 設置輸入值的輔助函數
        const setInputValue = (element, value) => {
          const precisedValue = roundNumber(value);
          if (element.classList.contains('button-input')) {
            element.dataset.value = precisedValue;
            element.textContent = precisedValue;
          } else {
            element.value = precisedValue;
          }
        };
        
        // 更新中間指示器
        const updateMiddleIndicator = () => {
          const middleValue = roundNumber(parseFloat(middleInput.value) || 0);
          middleIndicator.classList.remove('positive', 'negative', 'zero');
          middleIndicator.textContent = '▲';
          if (middleValue > 0) {
            middleIndicator.classList.add('positive');
          } else if (middleValue < 0) {
            middleIndicator.classList.add('negative');
          } else {
            middleIndicator.classList.add('zero');
          }
        };
        
        // 觸發三向綁定更新的函數
        const triggerThreeWayBinding = (changedType) => {
          const leftValue = getInputValue(leftInput);
          const resultValue = getInputValue(resultInput);
          const middleValue = parseFloat(middleInput.value) || 0;
          
          if (changedType === 'left') {
            // 配置1改變 → 變動量 = 配置2 - 配置1
            const newMiddle = roundNumber(resultValue - leftValue);
            middleInput.value = newMiddle;
          } else if (changedType === 'result') {
            // 配置2改變 → 變動量 = 配置2 - 配置1
            const newMiddle = roundNumber(resultValue - leftValue);
            middleInput.value = newMiddle;
          } else if (changedType === 'middle') {
            // 變動量改變 → 配置2 = 配置1 + 變動量
            const newResult = roundNumber(leftValue + middleValue);
            setInputValue(resultInput, newResult);
          }
          updateMiddleIndicator();
        };
        
        // 上下按钮的处理函数
        const handleSpinnerChange = (inputElement, increment) => {
          // 支持按鈕型輸入框
          if (inputElement.classList.contains('button-input')) {
            const currentValue = parseFloat(inputElement.dataset.value) || 0;
            const newValue = roundNumber(currentValue + increment);
            inputElement.dataset.value = newValue;
            inputElement.textContent = newValue;
            
            // 觸發三向綁定更新
            if (panelDiv.triggerThreeWayBinding) {
              const type = inputElement.classList.contains('left-input') ? 'left' : 'result';
              panelDiv.triggerThreeWayBinding(type);
            }
            return;
          }
          
          // 常規輸入框邏輯
          const currentValue = inputElement.value;
          let newValue;
          
          if (currentValue === '' || currentValue === null) {
            newValue = increment;
          } else {
            const num = parseFloat(currentValue);
            // 保留小数点精度并进行精度处理
            newValue = roundNumber(num + increment);
          }
          
          inputElement.value = newValue;
          // 触发 input 事件以更新关联的计算
          inputElement.dispatchEvent(new Event('input', { bubbles: true }));
        };
        
        // 為按鈕型輸入框添加事件處理
        if (useButtonInput) {
          const leftBtn = panelDiv.querySelector('.left-input');
          const resultBtn = panelDiv.querySelector('.result-input');
          
          // 將三向綁定函數存儲在 panelDiv 上，供對話框使用
          panelDiv.triggerThreeWayBinding = triggerThreeWayBinding;
          panelDiv.getInputValue = getInputValue;
          panelDiv.setInputValue = setInputValue;
          panelDiv.leftInput = leftInput;
          panelDiv.resultInput = resultInput;
          panelDiv.middleInput = middleInput;
          
          leftBtn.addEventListener('click', () => {
            openNumberInputDialog(leftBtn, 'left', index, panelDiv);
          });
          
          resultBtn.addEventListener('click', () => {
            openNumberInputDialog(resultBtn, 'result', index, panelDiv);
          });
        }
        
        // 配置1 改變 → 變動量 = 配置2 - 配置1
        if (leftInput.classList.contains('button-input')) {
          // 按鈕型輸入框不需要綁定 input 事件
        } else {
          leftInput.addEventListener('input', () => {
            triggerThreeWayBinding('left');
          });
        }
        
        // 配置2 改變 → 變動量 = 配置2 - 配置1
        if (resultInput.classList.contains('button-input')) {
          // 按鈕型輸入框不需要綁定 input 事件
        } else {
          resultInput.addEventListener('input', () => {
            triggerThreeWayBinding('result');
          });
        }
        
        // 變動量 改變 → 配置2 = 配置1 + 變動量
        middleInput.addEventListener('input', () => {
          triggerThreeWayBinding('middle');
        });

        // 绑定所有 spinner 按钮
        const spinnerBtns = panelDiv.querySelectorAll('.spinner-btn');
        spinnerBtns.forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            const dataType = btn.getAttribute('data-type');
            const isUp = btn.classList.contains('up');
            const increment = isUp ? 1 : -1;
            
            let inputElement;
            if (dataType === 'left') {
              inputElement = leftInput;
            } else if (dataType === 'middle') {
              inputElement = middleInput;
            } else if (dataType === 'result') {
              inputElement = resultInput;
            }
            
            if (inputElement) {
              handleSpinnerChange(inputElement, increment);
            }
          });
        });
        
        // 初始化指示器
        updateMiddleIndicator();
      }
      
      // 打開數字輸入對話框
      function openNumberInputDialog(button, type, index, panelDiv) {
        // 創建對話框
        let dialog = document.getElementById('numberInputDialog');
        if (!dialog) {
          dialog = document.createElement('div');
          dialog.id = 'numberInputDialog';
          dialog.className = 'number-input-dialog';
          dialog.innerHTML = `
            <div class="dialog-content">
              <input type="number" class="dialog-input" placeholder="輸入數字" />
              <div class="dialog-buttons">
                <button class="dialog-btn confirm">確認</button>
                <button class="dialog-btn cancel">取消</button>
              </div>
            </div>
          `;
          document.body.appendChild(dialog);
        }
        
        const input = dialog.querySelector('.dialog-input');
        const confirmBtn = dialog.querySelector('.dialog-btn.confirm');
        const cancelBtn = dialog.querySelector('.dialog-btn.cancel');
        
        // 設置初始值
        input.value = button.dataset.value || '';
        
        // 顯示對話框
        dialog.classList.add('show');
        input.focus();
        input.select();
        
        // 確認按鈕
        const handleConfirm = () => {
          const value = roundNumber(parseFloat(input.value) || 0);
          button.dataset.value = value;
          button.textContent = value;
          
          // 觸發三向綁定更新
          if (panelDiv.triggerThreeWayBinding) {
            const changeType = type === 'left' ? 'left' : 'result';
            panelDiv.triggerThreeWayBinding(changeType);
          }
          
          closeDialog();
        };
        
        // 取消按鈕
        const handleCancel = () => {
          closeDialog();
        };
        
        const closeDialog = () => {
          dialog.classList.remove('show');
          confirmBtn.removeEventListener('click', handleConfirm);
          cancelBtn.removeEventListener('click', handleCancel);
          document.removeEventListener('keydown', handleKeyDown);
        };
        
        // 鍵盤事件
        const handleKeyDown = (e) => {
          if (e.key === 'Enter') handleConfirm();
          if (e.key === 'Escape') handleCancel();
        };
        
        confirmBtn.addEventListener('click', handleConfirm);
        cancelBtn.addEventListener('click', handleCancel);
        document.addEventListener('keydown', handleKeyDown);
      }
      
      // 獲取對話框中輸入值的輔助函數
      function getInputValueForDialog(element) {
        let value;
        if (element && element.classList.contains('button-input')) {
          value = element.dataset.value ? parseFloat(element.dataset.value) : 0;
        } else {
          value = element && element.value ? parseFloat(element.value) : 0;
        }
        return roundNumber(value);
      }

      // 初始化時創建 wrapper 並設置默認高度
      const calcPanel = document.getElementById('calcPanel');
      let wrapper = calcPanel.querySelector('.input-items-wrapper');
      
      if (!wrapper) {
        wrapper = document.createElement('div');
        wrapper.className = 'input-items-wrapper';
        calcPanel.insertBefore(wrapper, calcPanel.firstChild);
      }
      
      // 如果有被選中的項目，添加 panels
      if (selectedGameStats.some(stat => stat === true)) {
        // 初始化時直接添加 panels，不需要動畫
        statItems.forEach((item, index) => {
          if (selectedGameStats[index]) {
            createInputPanel(item, index, wrapper, false);
          }
        });
      }
      
      // 無論有沒有 panels，都計算高度（設置默認高度）
      setTimeout(updatePanelHeight, 50);
    </script>
  </body>
</html>
