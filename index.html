<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My GitHub Page</title>
    <meta
      name="description"
      content="A basic GitHub Pages site starter."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="container">
      <p class="eyebrow">GitHub Pages Starter</p>
      <h1>你好，這是你的第一個 GitHub Page</h1>
      <p class="lead">
        這個頁面是靜態網站範本，放到 GitHub 後可以直接發佈。
      </p>

      <section class="card-row" aria-label="Quick links">
        <article class="card">
          <h2>編輯內容</h2>
          <p>修改這個檔案中的文字、標題與連結，做成你的個人頁面。</p>
        </article>
        <article class="card">
          <h2>新增專案</h2>
          <p>你可以在這裡放上作品集、履歷連結或聯絡方式。</p>
        </article>
      </section>

      <a class="cta" href="https://github.com/new" target="_blank" rel="noreferrer">
        前往建立 GitHub Repo
      </a>
    </main>
  </body>
</html>
